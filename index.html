<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlaylistSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #fdfdfd;
      }
      .step-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .step-card.active {
        border-color: #ef4444;
        box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.15);
      }
      .custom-loader {
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #ef4444;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .input-focus {
        transition: all 0.2s;
      }
      .input-focus:focus {
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
      }
      /* Toast Notification */
      #toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 12px;
        background: #fff;
        border-radius: 18px;
        padding: 14px 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        border-left: 4px solid #ef4444;
        min-width: 260px;
        max-width: 360px;
        transform: translateY(20px);
        opacity: 0;
        transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        pointer-events: none;
      }
      #toast.show {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      #toast.toast-warning { border-left-color: #f59e0b; }
      #toast.toast-error   { border-left-color: #ef4444; }
      #toast.toast-success { border-left-color: #22c55e; }
      /* Language Switcher */
      .lang-switcher {
        display: inline-flex;
        background: #f1f5f9;
        border-radius: 12px;
        padding: 3px;
        gap: 2px;
      }
      .lang-btn {
        padding: 4px 12px;
        border-radius: 9px;
        font-size: 11px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        background: transparent;
        color: #94a3b8;
        transition: all 0.2s;
        letter-spacing: 0.05em;
      }
      .lang-btn.active {
        background: #fff;
        color: #0f172a;
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen">
    <!-- Navbar / Header Area -->
    <header class="w-full py-8 text-center px-4 relative">
      <!-- Language Switcher -->
      <div class="absolute top-6 right-6">
        <div class="lang-switcher">
          <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="btn-id" onclick="setLang('id')">ID</button>
        </div>
      </div>
      <div class="flex items-center justify-center gap-3 mb-2">
        <div class="bg-red-600 p-2.5 rounded-2xl shadow-lg shadow-red-200">
          <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/>
          </svg>
        </div>
        <span class="text-2xl font-extrabold tracking-tight text-slate-800">Playlist<span class="text-red-600">Sync</span></span>
      </div>
      <p class="text-slate-500 text-sm font-medium" data-i18n="subtitle"></p>
    </header>

    <main class="max-w-2xl mx-auto px-4 pb-20">
      <!-- Tab Navigation -->
      <div class="flex gap-3 mb-6 border-b border-slate-200">
        <button id="tab-sync" class="tab-btn active px-6 py-3 font-semibold text-sm border-b-2 border-red-600 text-slate-900" data-i18n="tabSyncPlaylist"></button>
        <button id="tab-links" class="tab-btn px-6 py-3 font-semibold text-sm border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition-colors" data-i18n="tabSaveLinks"></button>
      </div>

      <!-- Tab descriptions -->
      <p id="tab-desc" class="text-slate-500 text-xs mb-4" data-i18n="tabSyncDesc"></p>

      <div class="grid gap-6">
        <!-- Step 1: Credentials -->
        <section
          id="card-1"
          class="step-card bg-white border border-slate-200 rounded-[2rem] p-8"
        >
          <div class="flex items-start justify-between mb-6">
            <div>
              <span class="inline-block px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase tracking-wider mb-2" data-i18n="step01"></span>
              <h2 class="text-xl font-bold" data-i18n="step01Title"></h2>
              <p class="text-slate-400 text-sm mt-1" data-i18n="step01Desc"></p>
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-4">
            <button
              id="load-creds"
              class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-2xl font-semibold text-sm transition-all flex items-center gap-2 group"
            >
              <svg
                class="w-4 h-4 text-slate-400 group-hover:text-white transition-colors"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                />
              </svg>
              <span data-i18n="btnLoadCreds"></span>
            </button>
            <div id="creds-status" class="flex items-center gap-2 text-sm text-slate-400 transition-all duration-300">
              <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
              <span data-i18n="credsWaiting"></span>
            </div>
          </div>
        </section>

        <!-- Step 2: Account Selection -->
        <section
          id="card-2"
          class="step-card bg-white border border-slate-100 rounded-[2rem] p-8 opacity-40"
        >
          <div class="flex items-start justify-between mb-6">
            <div>
              <span class="inline-block px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase tracking-wider mb-2" data-i18n="step02"></span>
              <h2 class="text-xl font-bold" data-i18n="step02Title"></h2>
              <p class="text-slate-400 text-sm mt-1" data-i18n="step02Desc"></p>
            </div>
          </div>

          <div class="grid sm:grid-cols-5 gap-3">
            <div class="sm:col-span-3">
              <select
                id="account-select"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-all appearance-none cursor-pointer"
              >
                <option value="" data-i18n-opt="selectAccount"></option>
              </select>
            </div>
            <div class="sm:col-span-2">
              <button
                id="login"
                disabled
                class="w-full h-full bg-white border-2 border-slate-200 text-slate-700 hover:border-red-500 hover:text-red-600 px-4 py-3 rounded-2xl font-bold text-sm transition-all disabled:opacity-50 disabled:hover:border-slate-200 disabled:hover:text-slate-700 flex items-center justify-center gap-2"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 6v6m0 0v6m0-6h6m-6 0H6"
                  />
                </svg>
                <span data-i18n="btnNewAccount"></span>
              </button>
            </div>
          </div>
          <div
            id="login-status"
            class="mt-4 text-[13px] text-slate-400 flex items-center gap-2"
          >
            <div
              class="status-dot w-1.5 h-1.5 rounded-full bg-slate-300 transition-all"
            ></div>
            <span class="status-text italic" data-i18n="noAccount"></span>
          </div>
        </section>

        <!-- Step 3: Transfer Process -->
        <section
          id="card-3"
          class="step-card bg-white border border-slate-100 rounded-[2rem] p-8 opacity-40"
        >
          <div class="flex items-start justify-between mb-6">
            <div>
              <span class="inline-block px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase tracking-wider mb-2" data-i18n="step03"></span>
              <h2 class="text-xl font-bold text-slate-800" data-i18n="step03Title"></h2>
              <p class="text-slate-400 text-sm mt-1" data-i18n="step03Desc"></p>
            </div>
          </div>

          <div class="space-y-5">
              <!-- Sync Mode Content -->
              <div id="sync-content" class="space-y-5">
            <div class="relative group">
              <input
                id="playlist"
                type="text"
                placeholder="https://www.youtube.com/playlist?list=..."
                class="input-focus w-full bg-slate-50 border border-slate-200 rounded-2xl pl-5 pr-12 py-4 text-sm outline-none focus:border-red-500 transition-all"
              />
              <div
                class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-red-500 transition-colors"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.812h.01M19 15.242a4 4 0 01-5.656 0l-4-4a4 4 0 015.656-5.656l1.103 1.103m-.758 4.812h.01"
                  />
                </svg>
              </div>
            </div>

            <!-- Destination Playlist Mode -->
            <div class="space-y-3">
              <label class="block text-sm font-semibold text-slate-700" data-i18n="destPlaylist"></label>
              <div class="flex items-center gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="sync-mode" id="sync-mode-new" value="new" checked class="w-4 h-4 cursor-pointer" />
                  <span class="text-sm" data-i18n="linksCreateNew"></span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="sync-mode" id="sync-mode-existing" value="existing" class="w-4 h-4 cursor-pointer" />
                  <span class="text-sm" data-i18n="linksUseExisting"></span>
                </label>
              </div>
            </div>

            <!-- New playlist name (shown when mode=new) -->
            <div id="sync-new-playlist-input" class="space-y-2">
              <label class="block text-sm font-semibold text-slate-700" data-i18n="playlistName"></label>
              <p class="text-xs text-slate-500" data-i18n="playlistNameDesc"></p>
              <input
                id="custom-playlist-name"
                type="text"
                class="input-focus w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm outline-none focus:border-red-500 transition-all"
                data-i18n-placeholder="playlistNamePlaceholder"
              />
            </div>

            <!-- Existing playlist dropdown (shown when mode=existing) -->
            <div id="sync-existing-playlist-select" class="hidden space-y-2">
              <label class="block text-sm font-semibold text-slate-700" data-i18n="selectPlaylist"></label>
              <div class="flex gap-2">
                <select
                  id="sync-playlist-select"
                  class="input-focus flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm outline-none focus:border-red-500 transition-all"
                >
                  <option value="">Select a playlist...</option>
                </select>
                <button
                  id="sync-refresh-playlists"
                  title="Refresh playlist list"
                  onclick="loadSyncPlaylistsDropdown()"
                  class="shrink-0 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-2xl px-4 py-3 text-slate-500 hover:text-slate-700 transition-all"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                  </svg>
                </button>
              </div>
            </div>

            <button
              id="transfer"
              disabled
              class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold text-base shadow-xl shadow-red-100 transition-all active:scale-[0.98] disabled:opacity-30 disabled:shadow-none flex items-center justify-center gap-3 group"
            >
              <span data-i18n="btnTransfer"></span>
              <svg
                class="w-5 h-5 group-hover:translate-x-1 transition-transform"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 8l4 4m0 0l-4 4m4-4H3"
                />
              </svg>
            </button>
              </div>

              <!-- Save Links Mode Content -->
              <div id="links-content" class="hidden space-y-5">
                <div class="space-y-2">
                  <label class="block text-sm font-semibold text-slate-700" data-i18n="linksLabel"></label>
                  <textarea
                    id="links-textarea"
                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm font-mono outline-none focus:border-red-500 transition-all resize-none h-24"
                    data-i18n-placeholder="linksTextarea"
                  ></textarea>
                </div>

                <div class="space-y-3">
                  <label class="block text-sm font-semibold text-slate-700">Playlist</label>
                  <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input
                        type="radio"
                        name="playlist-mode"
                        id="mode-new"
                        value="new"
                        checked
                        class="w-4 h-4 cursor-pointer"
                      />
                      <span class="text-sm" data-i18n="linksCreateNew"></span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input
                        type="radio"
                        name="playlist-mode"
                        id="mode-existing"
                        value="existing"
                        class="w-4 h-4 cursor-pointer"
                      />
                      <span class="text-sm" data-i18n="linksUseExisting"></span>
                    </label>
                  </div>
                </div>

                <div id="new-playlist-input" class="space-y-2">
                  <label class="block text-sm font-semibold text-slate-700" data-i18n="newPlaylistName"></label>
                  <input
                    id="new-playlist-name"
                    type="text"
                    class="input-focus w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm outline-none focus:border-red-500 transition-all"
                    placeholder="My Saved Links"
                  />
                </div>

                <div id="existing-playlist-select" class="hidden space-y-2">
                  <label class="block text-sm font-semibold text-slate-700" data-i18n="selectPlaylist"></label>
                  <div class="flex gap-2">
                    <select
                      id="playlist-select"
                      class="input-focus flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm outline-none focus:border-red-500 transition-all"
                    >
                      <option value="">Select a playlist...</option>
                    </select>
                    <button
                      id="refresh-playlists"
                      title="Refresh playlist list"
                      onclick="loadPlaylistsForDropdown()"
                      class="shrink-0 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-2xl px-4 py-3 text-slate-500 hover:text-slate-700 transition-all"
                    >
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                      </svg>
                    </button>
                  </div>
                </div>

                <button
                  id="save-links"
                  disabled
                  class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold text-base shadow-xl shadow-red-100 transition-all active:scale-[0.98] disabled:opacity-30 disabled:shadow-none flex items-center justify-center gap-3 group"
                >
                  <span data-i18n="btnSaveLinks"></span>
                  <svg
                    class="w-5 h-5 group-hover:translate-x-1 transition-transform"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M17 8l4 4m0 0l-4 4m4-4H3"
                    />
                  </svg>
                </button>
              </div>

            <!-- Progress Indicator -->
            <div
              id="progress-container"
              class="hidden animate-in fade-in slide-in-from-top-4 duration-500"
            >
              <div
                class="bg-slate-50 border border-slate-100 rounded-3xl p-6 mt-4"
              >
                <div class="flex justify-between items-end mb-3">
                  <div class="space-y-1">
                    <p id="progress-text" class="text-xs font-bold text-slate-500 uppercase tracking-widest" data-i18n="progressProcessing"></p>
                    <p id="progress-detail" class="text-sm font-semibold text-slate-700">0</p>
                  </div>
                  <span
                    id="progress-percent"
                    class="text-2xl font-black text-red-600"
                    >0%</span
                  >
                </div>
                <div
                  class="w-full h-3 bg-slate-200 rounded-full overflow-hidden"
                >
                  <div
                    id="progress-bar"
                    class="h-full bg-red-600 transition-all duration-700 ease-out shadow-[0_0_15px_rgba(239,68,68,0.4)]"
                    style="width: 0%"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const { ipcRenderer } = require("electron");

      // ── i18n ────────────────────────────────────────────────
      const translations = {
        en: require("./i18n/en.js"),
        id: require("./i18n/id.js"),
      };

      let currentLang = localStorage.getItem("lang") || "en";
      const t = (key, ...args) => {
        const val = translations[currentLang][key];
        return typeof val === "function" ? val(...args) : val;
      };

      function applyLang() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const val = t(el.dataset.i18n);
          el.innerHTML = typeof val === "undefined" ? el.dataset.i18n : val;
        });
        document.querySelectorAll("[data-i18n-opt]").forEach((el) => {
          const v = t(el.dataset.i18nOpt);
          el.textContent = typeof v === "undefined" ? el.dataset.i18nOpt : v;
        });
        document.getElementById("btn-en").classList.toggle("active", currentLang === "en");
        document.getElementById("btn-id").classList.toggle("active", currentLang === "id");
        document.documentElement.lang = currentLang;
      }

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem("lang", lang);
        applyLang();
        updatePlaceholders();
        // Refresh tab description in the active language
        const desc = activeTab === "sync" ? t("tabSyncDesc") : t("tabLinksDesc");
        document.getElementById("tab-desc").innerText = desc;
      }

      function updatePlaceholders() {
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          el.placeholder = t(el.dataset.i18nPlaceholder);
        });
      }
      // ────────────────────────────────────────────────────────
      // Tab Management
      let activeTab = "sync";

      function switchTab(tab) {
        activeTab = tab;
        localStorage.setItem("activeTab", tab);

        // Update tab buttons
        const syncBtn = document.getElementById("tab-sync");
        const linksBtn = document.getElementById("tab-links");

        if (tab === "sync") {
          syncBtn.classList.add("border-red-600", "text-slate-900");
          syncBtn.classList.remove("border-transparent", "text-slate-400");
          linksBtn.classList.remove("border-red-600", "text-slate-900");
          linksBtn.classList.add("border-transparent", "text-slate-400");
        } else {
          linksBtn.classList.add("border-red-600", "text-slate-900");
          linksBtn.classList.remove("border-transparent", "text-slate-400");
          syncBtn.classList.remove("border-red-600", "text-slate-900");
          syncBtn.classList.add("border-transparent", "text-slate-400");
        }

        // Update description
        const desc = tab === "sync" ? t("tabSyncDesc") : t("tabLinksDesc");
        document.getElementById("tab-desc").innerText = desc;

        // Show/hide relevant inputs
        const syncContent = document.getElementById("sync-content");
        const linksContent = document.getElementById("links-content");

        if (tab === "sync") {
          syncContent.classList.remove("hidden");
          linksContent.classList.add("hidden");
        } else {
          syncContent.classList.add("hidden");
          linksContent.classList.remove("hidden");
          // Load playlists for dropdown
          loadPlaylistsForDropdown();
        }
      }

      async function loadPlaylistsForDropdown() {
        const accountName = document.getElementById("account-select").value;
        const select = document.getElementById("playlist-select");

        if (!accountName) {
          showToast("warning", t("toastAccTitle"), t("toastAccMsg"));
          return;
        }

        select.innerHTML = `<option value="">${t("loadingPlaylists")}</option>`;
        select.disabled = true;

        try {
          const res = await ipcRenderer.invoke("get-user-playlists", { accountName });
          if (res && res.success && res.playlists.length > 0) {
            select.innerHTML = `<option value="">${t("selectPlaylist")}</option>`;
            res.playlists.forEach((p) => {
              const opt = document.createElement("option");
              opt.value = p.id;
              opt.textContent = p.title;
              select.appendChild(opt);
            });
          } else if (res && res.success && res.playlists.length === 0) {
            select.innerHTML = `<option value="">${t("noPlaylistsFound")}</option>`;
          } else {
            select.innerHTML = `<option value="">${t("loadFailedRetry")}</option>`;
            showToast("error", t("loadFailed"), res.error || t("loadFailedMsg"));
          }
        } catch (err) {
          select.innerHTML = `<option value="">${t("loadErrorPrefix", err.message)}</option>`;
          showToast("error", t("loadFailed"), err.message);
        } finally {
          select.disabled = false;
        }
      }

      async function loadSyncPlaylistsDropdown() {
        const accountName = document.getElementById("account-select").value;
        const select = document.getElementById("sync-playlist-select");

        if (!accountName) {
          showToast("warning", t("toastAccTitle"), t("toastAccMsg"));
          return;
        }

        select.innerHTML = `<option value="">${t("loadingPlaylists")}</option>`;
        select.disabled = true;

        try {
          const res = await ipcRenderer.invoke("get-user-playlists", { accountName });
          if (res && res.success && res.playlists.length > 0) {
            select.innerHTML = `<option value="">${t("selectPlaylist")}</option>`;
            res.playlists.forEach((p) => {
              const opt = document.createElement("option");
              opt.value = p.id;
              opt.textContent = p.title;
              select.appendChild(opt);
            });
          } else if (res && res.success && res.playlists.length === 0) {
            select.innerHTML = `<option value="">${t("noPlaylistsFound")}</option>`;
          } else {
            select.innerHTML = `<option value="">${t("loadFailedRetry")}</option>`;
            showToast("error", t("loadFailed"), res.error || t("loadFailedMsg"));
          }
        } catch (err) {
          select.innerHTML = `<option value="">${t("loadErrorPrefix", err.message)}</option>`;
          showToast("error", t("loadFailed"), err.message);
        } finally {
          select.disabled = false;
        }
      }

      // Tab button event listeners
      document.getElementById("tab-sync").onclick = () => switchTab("sync");
      document.getElementById("tab-links").onclick = () => switchTab("links");
      // ────────────────────────────────────────────────────────

      // UI Feedback Helpers
      function setStepActive(stepId) {
        const el = document.getElementById(stepId);
        el.classList.remove("opacity-40");
        el.classList.add("active", "border-red-100");
      }

      function setStatus(id, type, message) {
        const el = document.getElementById(id);
        const dot = el.querySelector(".status-dot") || el.querySelector("div");
        const text =
          el.querySelector(".status-text") || el.querySelector("span");

        text.innerText = message;

        // Reset classes
        dot.className = "w-1.5 h-1.5 rounded-full transition-all";
        text.className = "transition-all";

        if (type === "success") {
          dot.classList.add(
            "bg-green-500",
            "shadow-[0_0_8px_rgba(34,197,94,0.5)]",
          );
          text.classList.add("text-green-600", "font-medium");
        } else if (type === "error") {
          dot.classList.add("bg-red-500");
          text.classList.add("text-red-500");
        } else if (type === "loading") {
          dot.classList.add("bg-blue-500", "animate-pulse");
          text.classList.add("text-blue-500");
        } else {
          dot.classList.add("bg-slate-300");
          text.classList.add("text-slate-400", "italic");
        }
      }

      async function loadAccounts() {
        const select = document.getElementById("account-select");
        select.innerHTML = `<option value="">${t("selectAccount")}</option>`;
        const accounts = await ipcRenderer.invoke("get-accounts");
        accounts.forEach((acc) => {
          const opt = document.createElement("option");
          opt.value = acc;
          opt.textContent = acc;
          select.appendChild(opt);
        });
      }

      document.getElementById("account-select").onchange = (e) => {
        const val = e.target.value;
        if (val) {
          setStatus("login-status", "success", t("active", val));
          document.getElementById("transfer").disabled = false;
          document.getElementById("save-links").disabled = false;
          setStepActive("card-3");
        } else {
          setStatus("login-status", "default", t("noAccount"));
          document.getElementById("transfer").disabled = true;
          document.getElementById("save-links").disabled = true;
        }
      };

      // Step 1: Credentials
      document.getElementById("load-creds").onclick = async () => {
        const statusEl = document.getElementById("creds-status");
        statusEl.innerHTML = `<div class="custom-loader"></div> <span class="text-blue-500 font-medium">${t("openingFile")}</span>`;

        const res = await ipcRenderer.invoke("load-credentials");

        if (res.success || res.alreadyExists) {
          statusEl.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div> <span class="text-green-600 font-bold">${t("apiActive")}</span>`;
          document.getElementById("login").disabled = false;
          setStepActive("card-1");
          setStepActive("card-2");
          await loadAccounts();
        } else {
          statusEl.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div> <span class="text-slate-400">${t("failedLoad")}</span>`;
        }
      };

      // Step 2: Login
      document.getElementById("login").onclick = async () => {
        setStatus("login-status", "loading", t("waitingAuth"));
        await ipcRenderer.invoke("login-google");
      };

      ipcRenderer.on("login-success", async (_, accountName) => {
        await loadAccounts();
        document.getElementById("account-select").value = accountName;
        document
          .getElementById("account-select")
          .dispatchEvent(new Event("change"));
      });

      ipcRenderer.on("login-error", (_, message) => {
        setStatus("login-status", "error", t("loginFailedMsg", message));
        showToast("error", t("loginFailed"), message);
      });

      // Step 3: Transfer
      document.getElementById("transfer").onclick = async () => {
        const url = document.getElementById("playlist").value.trim();
        if (!url) {
          showToast("warning", t("toastUrlTitle"), t("toastUrlMsg"));
          return;
        }

        const accountName = document.getElementById("account-select").value;
        if (!accountName) {
          showToast("warning", t("toastAccTitle"), t("toastAccMsg"));
          return;
        }

        const syncMode = document.querySelector("input[name='sync-mode']:checked").value;
        const customName = document.getElementById("custom-playlist-name").value.trim();
        let targetPlaylistId = "";

        if (syncMode === "existing") {
          targetPlaylistId = document.getElementById("sync-playlist-select").value;
          if (!targetPlaylistId) {
            showToast("warning", t("selectPlaylist"), t("toastNeedPlaylist"));
            return;
          }
        }
        const progressContainer = document.getElementById("progress-container");
        const transferBtn = document.getElementById("transfer");

        progressContainer.classList.remove("hidden");
        transferBtn.disabled = true;
        transferBtn.querySelector("[data-i18n]").innerText = t("processing");

        ensureLogBox(progressContainer);

        try {
          const result = await ipcRenderer.invoke("transfer-playlist", { url, accountName, customName, targetPlaylistId });

          document.getElementById("progress-bar").style.width = "100%";

          if (result.failedCount > 0) {
            document.getElementById("progress-text").innerText = t("doneLabel");
            document.getElementById("progress-text").classList.replace("text-slate-500", "text-amber-500");
            transferBtn.querySelector("[data-i18n]").innerText = t("done");
            showToast("warning", t("toastTransferDone"), t("toastTransferPartial", result.successCount, result.failedCount));
          } else {
            document.getElementById("progress-text").innerText = t("doneLabel");
            document.getElementById("progress-text").classList.add("text-green-600");
            transferBtn.querySelector("[data-i18n]").innerText = t("done");
            showToast("success", t("toastTransferDone"), t("toastTransferAll"));
          }
        } catch (err) {
          document.getElementById("progress-text").innerText = t("failed");
          let errorMsg = err.message || t("errorOccurred");
          if (errorMsg.includes("Error: ")) errorMsg = errorMsg.split("Error: ")[1];

          // Session expired — prompt re-login
          if (errorMsg.startsWith("SESSION_EXPIRED:")) {
            errorMsg = errorMsg.replace("SESSION_EXPIRED: ", "");
            showToast("error", t("sessionExpired"), t("reloginStep02"));
          }

          document.getElementById("progress-detail").innerText = errorMsg;
          document.getElementById("progress-detail").classList.add("text-red-500");
          document.getElementById("progress-text").classList.add("text-red-500");
          transferBtn.querySelector("[data-i18n]").innerText = t("tryAgain");
        }
        transferBtn.disabled = false;
      };

      ipcRenderer.on("progress", (_, data) => {
        const percent = Math.round((data.current / data.total) * 100);
        document.getElementById("progress-detail").innerText = t("ofVideos", data.current, data.total);
        document.getElementById("progress-percent").innerText = `${percent}%`;
        document.getElementById("progress-bar").style.width = `${percent}%`;

        // Update UI Log
        const logContent = document.getElementById("transfer-log-content");
        const logStats = document.getElementById("log-stats");

        if (logContent && logStats) {
          logStats.innerText = t("logStats", data.successCount, data.failedCount);

          let idPadding = data.current.toString().padStart(data.total.toString().length, "0");
          let logLine = "";

          if (data.status === "success") {
            logLine = `<div class="text-green-400">><span class="text-slate-500 ml-1 mr-2">[${idPadding}/${data.total}]</span> ID: ${data.videoId} <span class="text-slate-500">........</span> ${t("logSuccess")}</div>`;
          } else {
            let shortReason = data.reason.length > 40 ? data.reason.substring(0, 40) + "..." : data.reason;
            logLine = `<div class="text-red-400">><span class="text-slate-500 ml-1 mr-2">[${idPadding}/${data.total}]</span> ID: ${data.videoId} <span class="text-slate-500">........</span> ${t("logFailed")} (${shortReason})</div>`;
          }

          logContent.insertAdjacentHTML('beforeend', logLine);
          logContent.scrollTop = logContent.scrollHeight;
        }
      });

      // Auto-load logic
      window.onload = async () => {
        // Sync Playlist mode radio handlers
        document.getElementById("sync-mode-new").onchange = () => {
          document.getElementById("sync-new-playlist-input").classList.remove("hidden");
          document.getElementById("sync-existing-playlist-select").classList.add("hidden");
        };

        document.getElementById("sync-mode-existing").onchange = () => {
          document.getElementById("sync-new-playlist-input").classList.add("hidden");
          document.getElementById("sync-existing-playlist-select").classList.remove("hidden");
          loadSyncPlaylistsDropdown();
        };

        // Mode radio button handlers (Save Links)
        document.getElementById("mode-new").onchange = () => {
          document.getElementById("new-playlist-input").classList.remove("hidden");
          document.getElementById("existing-playlist-select").classList.add("hidden");
        };

        document.getElementById("mode-existing").onchange = () => {
          document.getElementById("new-playlist-input").classList.add("hidden");
          document.getElementById("existing-playlist-select").classList.remove("hidden");
          // Always (re)load playlists when user picks this option
          loadPlaylistsForDropdown();
        };

        // Helper: create or reset the terminal log box
        window.ensureLogBox = function(container) {
          let logBox = document.getElementById("transfer-log-box");
          if (!logBox) {
            container.insertAdjacentHTML('beforeend', `
              <div id="transfer-log-box" class="mt-5 bg-slate-900 rounded-2xl p-4 overflow-hidden flex flex-col h-48 shadow-inner animate-in fade-in slide-in-from-top-2">
                <div class="flex justify-between items-center text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest border-b border-slate-700 pb-2">
                  <span id="log-title">${t("logTitle")}</span>
                  <span id="log-stats" class="bg-slate-800 px-2 py-1 rounded-md">${t("logStats", 0, 0)}</span>
                </div>
                <div id="transfer-log-content" class="overflow-y-auto flex-1 text-[11px] font-mono space-y-1 pr-2 pb-1 scroll-smooth"></div>
              </div>
            `);
          } else {
            document.getElementById("transfer-log-content").innerHTML = "";
            document.getElementById("log-stats").innerText = t("logStats", 0, 0);
            document.getElementById("log-title").innerText = t("logTitle");
          }
        };

        // Save Links button handler
        document.getElementById("save-links").onclick = async () => {
          const linksText = document.getElementById("links-textarea").value.trim();
          if (!linksText) {
            showToast("warning", t("toastUrlTitle"), t("toastNeedLink"));
            return;
          }

          const accountName = document.getElementById("account-select").value;
          if (!accountName) {
            showToast("warning", t("toastAccTitle"), t("toastAccMsg"));
            return;
          }

          const mode = document.querySelector("input[name='playlist-mode']:checked").value;
          let playlistName = "", playlistId = "";

          if (mode === "new") {
            playlistName = document.getElementById("new-playlist-name").value.trim() || "Saved Links";
          } else {
            playlistId = document.getElementById("playlist-select").value;
            if (!playlistId) {
              showToast("warning", t("selectPlaylist"), t("toastNeedPlaylist"));
              return;
            }
          }

          const progressContainer = document.getElementById("progress-container");
          const saveBtn = document.getElementById("save-links");

          progressContainer.classList.remove("hidden");
          saveBtn.disabled = true;

          ensureLogBox(progressContainer);

          try {
            const result = await ipcRenderer.invoke("save-bulk-links", {
              linksText,
              accountName,
              mode,
              playlistName,
              playlistId,
            });

            document.getElementById("progress-bar").style.width = "100%";

            if (result.failedCount > 0) {
              document.getElementById("progress-text").innerText = t("doneLabel");
              document.getElementById("progress-text").classList.replace("text-slate-500", "text-amber-500");
              saveBtn.querySelector("[data-i18n]").innerText = t("done");
              showToast("warning", t("toastLinksDone"), t("toastLinksPartial", result.successCount, result.failedCount));
            } else {
              document.getElementById("progress-text").innerText = t("doneLabel");
              document.getElementById("progress-text").classList.add("text-green-600");
              saveBtn.querySelector("[data-i18n]").innerText = t("done");
              showToast("success", t("toastLinksDone"), t("toastLinksAll"));
            }
          } catch (err) {
            document.getElementById("progress-text").innerText = t("failed");
            let errorMsg = err.message || t("errorOccurred");
            if (errorMsg.includes("Error: ")) errorMsg = errorMsg.split("Error: ")[1];

            // Session expired — prompt re-login
            if (errorMsg.startsWith("SESSION_EXPIRED:")) {
              errorMsg = errorMsg.replace("SESSION_EXPIRED: ", "");
              showToast("error", t("sessionExpired"), t("reloginStep02"));
            }

            document.getElementById("progress-detail").innerText = errorMsg;
            document.getElementById("progress-detail").classList.add("text-red-500");
            document.getElementById("progress-text").classList.add("text-red-500");
            saveBtn.querySelector("[data-i18n]").innerText = t("tryAgain");
          }
          saveBtn.disabled = false;
        };

        applyLang();
        updatePlaceholders();
        const fs = require("fs");

        // Initialize tab mode
        activeTab = localStorage.getItem("activeTab") || "sync";
        if (activeTab === "links") {
          switchTab("links");
        }

        if (fs.existsSync("credentials.json")) {
          const statusEl = document.getElementById("creds-status");
          statusEl.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div> <span class="text-green-600 font-bold">${t("apiActive")}</span>`;
          document.getElementById("login").disabled = false;
          setStepActive("card-1");
          setStepActive("card-2");
          await loadAccounts();
        }
      };

      function showToast(type, title, message) {
        const toast = document.getElementById("toast");
        const icons = {
          warning: `<svg class="w-5 h-5 text-amber-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`,
          error:   `<svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`,
          success: `<svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`,
        };
        toast.className = `toast-${type}`;
        toast.innerHTML = `
          ${icons[type] || icons.error}
          <div>
            <p class="text-sm font-bold text-slate-800">${title}</p>
            <p class="text-xs text-slate-500 mt-0.5">${message}</p>
          </div>`;
        void toast.offsetWidth;
        toast.classList.add("show");
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove("show"), 4000);
      }
    </script>
  <!-- Toast Notification -->
  <div id="toast"></div>
  </body>
</html>
